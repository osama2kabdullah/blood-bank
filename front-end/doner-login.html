<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./static/js/auth-guard.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doner Login | Blood Bank Shiromoni</title>
  <link rel="stylesheet" href="./static/css/style.css">
</head>
<body>
  <header>
    <div class="header-content container">
      <div class="logo">
        <a href="index.html">
          <img src="./static/images/logo.png" alt="Blood Bank Shiromoni Logo">
        </a>
      </div>
      <div class="header-right-side">
        <div class="nav-links">
          <a href="index.html" class="nav-link">Home</a>
        </div>
        <a class="action-btn" href=""></a>
        <button class="hamburger-menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">Home</a>
      </div>
    </div>
  </header>

  <section class="page-hero">
    <div class="container">
      <h1 class="page-title">Doner Login</h1>
      <p class="page-subtitle">Sign in to your donor account to update your availability, and manage your donor profile.</p>
    </div>
  </section>

  <main class="container">
    <div class="dashboard-grid">
      <div class="form-card">
        <form id="loginForm" class="form-grid">
          <div class="form-row">
            <div class="form-field">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" name="phone" placeholder="ex: +880123456789">
            </div>
            <div class="form-field">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="Enter password">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>&nbsp;</label>
              <button type="submit" class="btn-primary">Login to Account</button>
            </div>
          </div>
          <p class="helper-text">If you do not have an account yet, register now and join the donor community.</p>
          <p>New donor? <a href="doner-registration.html" class="form-link">Create an account</a>.</p>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>❤️ Developed by <a href="https://www.linkedin.com/in/md-abdullah-9121b5228/" target="_blank" rel="noopener noreferrer">Osama Abdullah</a></p>
    </div>
  </footer>

  <script src="./static/js/script.js"></script>
  <script defer src="./static/js/auth.js"></script>
</body>
</html>
