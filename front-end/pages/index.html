  <header>
    <div class="header-content container">
      <div class="logo">
        <a href="index.html">
          <img src="../static/images/logo.png" alt="Blood Bank Shiromoni Logo">
        </a>
      </div>
      <div class="header-right-side">
        <div class="nav-links">
          <a href="index.html" class="nav-link">Home</a>
        </div>
        <a class="action-btn"></a>
        <button class="hamburger-menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">Home</a>
      </div>
    </div>
  </header>

  <section class="page-hero">
    <div class="container">
      <form class="form-card">
        <div class="form-row">
          <div class="form-field">
            <label for="bloodGroup">Blood Group</label>
            <div class="radio-group">
              <label><input type="radio" name="bloodGroup" value="" checked> All</label>
              <label><input type="radio" name="bloodGroup" value="A+"> A+</label>
              <label><input type="radio" name="bloodGroup" value="A-"> A-</label>
              <label><input type="radio" name="bloodGroup" value="B+"> B+</label>
              <label><input type="radio" name="bloodGroup" value="B-"> B-</label>
              <label><input type="radio" name="bloodGroup" value="AB+"> AB+</label>
              <label><input type="radio" name="bloodGroup" value="AB-"> AB-</label>
              <label><input type="radio" name="bloodGroup" value="O+"> O+</label>
              <label><input type="radio" name="bloodGroup" value="O-"> O-</label>
            </div>
          </div>
          <div class="form-field">
            <label for="location">Location</label>
            <label for="location">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="search-icon" viewBox="0 0 16 16">
                <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10m0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6"/>
              </svg>
              <input type="search" autocomplete="off" id="location" name="location" placeholder="Rajshahi, Dhaka, etc.">
            </label>
          </div>
        </div>
      </form>
    </div>
  </section>
