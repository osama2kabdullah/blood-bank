<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./static/js/auth-guard.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doner Account | Blood Bank Shiromoni</title>
  <meta name="description" content="Manage your Blood Bank Shiromoni donor account, update profile details, and maintain your donor list.">
  <meta name="keywords" content="donor account, blood donor profile, blood bank dashboard">
  <meta name="author" content="Blood Bank Shiromoni">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#b6002f">
  <link rel="canonical" href="/doner-account.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Doner Account | Blood Bank Shiromoni">
  <meta property="og:description" content="Manage your donor account, profile, and donor records.">
  <meta property="og:url" content="/doner-account.html">
  <meta property="og:image" content="./static/images/logo.png">
  <meta property="og:site_name" content="Blood Bank Shiromoni">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Doner Account | Blood Bank Shiromoni">
  <meta name="twitter:description" content="Manage your donor account, profile, and donor records.">
  <meta name="twitter:image" content="./static/images/logo.png">
  <link rel="icon" type="image/x-icon" href="./static/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./static/images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./static/images/apple-touch-icon.png">
  <link rel="stylesheet" href="./static/css/style.css">
</head>
<body>
  <header>
    <div class="header-content container">
      <div class="logo">
        <a href="index.html">
          <img src="./static/images/logo.png" alt="Blood Bank Shiromoni Logo">
        </a>
      </div>
      <div class="header-right-side">
        <div class="nav-links">
          <a href="index.html" class="nav-link">Home</a>
        </div>
        <a class="action-btn" href=""></a>
        <button type="button" class="hamburger-menu" aria-label="Toggle mobile menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">Home</a>
      </div>
    </div>
  </header>
  <section class="page-hero"></section>

  <main class="container">
    <div class="account-dashboard">
      <button class="side-bar-toggle btn-secondary">
        <div class="hamburger-menu">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <span class="toggle-text">Menu</span>
      </button>
      <aside class="account-sidebar">
        <div class="avatar">
          <span class="avatar-placeholder">JD</span>
          <h2>John Doe</h2>
        </div>
        <nav>
          <ul>
            <li><a href="#your-info">Your Info</a></li>
            <li><a href="#my-donors">My Donors</a></li>
            <li><a href="#settings">Settings</a></li>
          </ul>
        </nav>
        <button class="btn-secondary add-donor">Add Donor</button>
      </aside>
      <section class="account-content">

        <div id="sectionLoader" class="active">
          <div class="loader-spinner"></div>
        </div>

        <!--account info-->
        <div class="dashboard-grid account-info">
          <div class="form-card">
            <form action="/user-donation-info" method="put" data-next="#your-info" id="your-info-form" class="form-grid">
              <span class="caption">Your Information</span>
              <div class="form-row">
                <div class="form-field">
                  <label for="blood_group">Blood Group</label>
                  <div class="radio-group">
                    <label><input type="radio" name="blood_group" value="A+"> A+</label>
                    <label><input type="radio" name="blood_group" value="A-"> A-</label>
                    <label><input type="radio" name="blood_group" value="B+"> B+</label>
                    <label><input type="radio" name="blood_group" value="B-"> B-</label>
                    <label><input type="radio" name="blood_group" value="AB+"> AB+</label>
                    <label><input type="radio" name="blood_group" value="AB-"> AB-</label>
                    <label><input type="radio" name="blood_group" value="O+"> O+</label>
                    <label><input type="radio" name="blood_group" value="O-"> O-</label>
                  </div>
                </div>
                <div class="form-field">
                  <label for="location">Location</label>
                  <input type="text" id="location" name="location" placeholder="Rajshahi, Dhaka, etc.">
                </div>
              </div>

              <div class="form-row">
                <div class="form-field">
                  <label for="lastDonation">Last Blood Donation</label>

                  <div class="date-input">
                    <input type="date" id="lastDonation" name="lastDonation">

                    <span class="calendar-icon">
                      📅
                    </span>
                  </div>
                </div>
              </div>

              <div class="form-row">
                <div class="form-field">
                  <label>&nbsp;</label>
                  <button type="submit" class="btn-secondary">Update Information</button>
                </div>
              </div>

              <div class="form-messages">
                <div class="error-message" style="display: none;"></div>
                <div class="success-message" style="display: none;"></div>
              </div>
            </form>
          </div>
        </div>

        <!--settings-->
        <div class="dashboard-grid account-settings one">
          <div class="form-card">
            <form action="/me" method="put" data-next="#settings" id="user-settings-form" class="form-grid">
              <span class="caption">Settings</span>
              <div class="form-row">
                <div class="form-field">
                  <label for="name">Full Name</label>
                  <input type="text" id="name" name="name" placeholder="ex: Mehedi Hasan">
                </div>
                <div class="form-field">
                  <label for="phone">Phone Number</label>
                  <input type="tel" id="phone" name="phone" placeholder="ex: +880123456789">
                </div>
              </div>
              <div class="form-row">
                <div class="form-field">
                  <label>&nbsp;</label>
                  <button type="submit" class="btn-secondary">Update Information</button>
                </div>
              </div>

              <div class="form-messages">
                <div class="error-message" style="display: none;"></div>
                <div class="success-message" style="display: none;"></div>
              </div>

            </form>
          </div>
        </div>
          
        <div class="dashboard-grid account-settings two">
          <div class="form-card">
            <form action="/auth/change-password" method="post" data-next="#settings" id="change-password-form" class="form-grid">
              <span class="caption">Change Password</span>
              <div class="form-row">
                <div class="form-field">
                  <label for="currentPassword">Current Password</label>
                  <input type="password" id="currentPassword" name="current_password" placeholder="Enter current password">
                </div>
              </div>
              <div class="form-row">
                <div class="form-field">
                  <label for="newpassword">New Password</label>
                  <input type="password" id="newpassword" name="new_password" placeholder="Enter new password">
                </div>
                <div class="form-field">
                  <label for="confirmPassword">Confirm Password</label>
                  <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm password">
                </div>
              </div>
              <div class="form-row">
                <div class="form-field">
                  <label>&nbsp;</label>
                  <button type="submit" class="btn-secondary">Update Information</button>
                </div>
              </div>
              <div class="form-messages">
                <div class="error-message" style="display: none;"></div>
                <div class="success-message" style="display: none;"></div>
              </div>
            </form>
          </div>
        </div>
        
        <div class="dashboard-grid account-settings three">
          <div class="form-card">
            <form action="/auth/delete-account" method="delete" data-next="#settings" id="delete-account-form" class="form-grid">
              <span class="caption">Delete Account</span>
              <div class="form-row">
                <div class="form-field">
                  <label for="delete-password">Password</label>
                  <input type="password" id="delete-password" name="password" placeholder="Enter password">
                </div>
              </div>
              <div class="form-row">
                <div class="form-field">
                  <label>&nbsp;</label>
                  <button type="submit" class="btn-primary">Delete Account</button>
                </div>
              </div>
              <div class="form-messages">
                <div class="error-message" style="display: none;"></div>
                <div class="success-message" style="display: none;"></div>
              </div>
            </form>
          </div>
        </div>

        <!--new donor-->
        <div class="dashboard-grid account-new-donor">
          <div class="form-card">
            <form action="/donors/add" method="post" data-next="#my-donors" id="new-donor-form" class="form-grid">
              <span class="caption">New Donor</span>
              <div class="form-row">
                <div class="form-field">
                  <label for="new-donor-name">Full Name</label>
                  <input type="text" id="new-donor-name" name="name" placeholder="ex: Mehedi Hasan">
                </div>
                <div class="form-field">
                  <label for="new-donor-phone">Phone Number</label>
                  <input required type="tel" id="new-donor-phone" name="phone" placeholder="ex: +880123456789">
                </div>
              </div>

              <div class="form-row">
                <div class="form-field">
                  <label data-required="true" for="blood_group">Blood Group</label>
                  <div class="radio-group">
                    <label><input type="radio" name="blood_group" value="A+"> A+</label>
                    <label><input type="radio" name="blood_group" value="A-"> A-</label>
                    <label><input type="radio" name="blood_group" value="B+"> B+</label>
                    <label><input type="radio" name="blood_group" value="B-"> B-</label>
                    <label><input type="radio" name="blood_group" value="AB+"> AB+</label>
                    <label><input type="radio" name="blood_group" value="AB-"> AB-</label>
                    <label><input type="radio" name="blood_group" value="O+"> O+</label>
                    <label><input type="radio" name="blood_group" value="O-"> O-</label>
                  </div>
                </div>
                <div class="form-field">
                  <label for="new-donor-location">Location</label>
                  <input required type="text" id="new-donor-location" name="location" placeholder="Rajshahi, Dhaka, etc.">
                </div>
              </div>

              <div class="form-row">
                <div class="form-field">
                  <label for="new-donor-last-donation">Last Blood Donation</label>

                  <div class="date-input">
                    <input type="date" id="new-donor-last-donation" name="last_donation">

                    <span class="calendar-icon">
                      📅
                    </span>
                  </div>
                </div>
              </div>
              <div class="form-row">
                <div class="form-field">
                  <label>&nbsp;</label>
                  <button type="submit" class="btn-secondary">Add Donor</button>
                </div>
              </div>
              
              <div class="form-messages">
                <div class="error-message" style="display: none;"></div>
                <div class="success-message" style="display: none;"></div>
              </div>

            </form>
          </div>
        </div>

        <!--my doner list-->
        <div class="account-donor-list">
          <div class="section-header">
            <h2>My Donors</h2>
            <button class="btn-secondary add-donor">Add Donor</button>
          </div>
          <div class="donor-list" id="donorList"></div>
  
          <div class="no-donors">
            <p class="">
              You haven't added any donors yet. Click the "Add Donor" button to start building your donor list.
            </p>
            <button class="btn-secondary add-donor">Add Donor</button>
          </div>
        </div>

      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>❤️ Developed by <a href="https://www.linkedin.com/in/md-abdullah-9121b5228/" target="_blank" rel="noopener noreferrer">Osama Abdullah</a></p>
    </div>
  </footer>

  <script src="./static/js/script.js"></script>
  <script defer src="./static/js/account-dashboard.js"></script>
</body>
</html>
